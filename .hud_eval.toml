# HUD Eval Configuration
# Command-line arguments override these settings

[eval]
# source = "hud-evals/SheetBench-50"
# agent = "claude"
# all = false  # Run all problems instead of just 1
# max_concurrent = 30
# max_steps = 10
# group_size = 1
# task_ids = ["checkout-smoke", "0"]  # slugs or 0-based indices
# verbose = true
# very_verbose = true
# auto_respond = true
# gateway = false  # Route LLM API calls through HUD Gateway
# runtime = "local"  # local, hud, or tcp://host:port
# remote = false  # Run the whole rollout remotely on HUD

[claude]
# model = "claude-sonnet-4-6"
# max_tokens = 16384
# use_computer_beta = true

[openai]
# model = "gpt-5.5"
# temperature = 0.7
# max_output_tokens = 4096

[gemini]
# model = "gemini-2.5-pro"
# temperature = 1.0
# top_p = 0.95

[openai_compatible]
# base_url = "http://localhost:8000/v1"
# model = "my-model"
# Required for GRPO: gateway must return token ids + logprobs on trainable models.
completion_kwargs = { extra_body = { return_token_ids = true } }
